services:
  uchi:
    build:
      context: .
      dockerfile: Dockerfile
    image: uchi:latest
    container_name: uchi
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/data/prod.db"
      PORT: "3000"
    volumes:
      # SQLite ファイルをホストに永続化
      - uchi-data:/app/data
    restart: unless-stopped

volumes:
  uchi-data:
