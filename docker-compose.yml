services:
  uchi:
    build:
      context: .
      dockerfile: Dockerfile
    image: uchi:latest
    container_name: uchi
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/data/prod.db"
      PORT: "3000"
    volumes:
      - uchi-data:/app/data
    restart: unless-stopped

  # 起動時に自己署名証明書を生成し、CaddyでHTTSリバースプロキシ
  caddy:
    image: caddy:2
    container_name: caddy
    ports:
      - "7635:7635"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
      - caddy-certs:/certs
    entrypoint: /bin/sh
    command: >
      -c "
      if [ ! -f /certs/cert.pem ]; then
        apk add --no-cache openssl &&
        openssl req -x509 -nodes -days 3650
          -newkey rsa:2048
          -keyout /certs/key.pem
          -out /certs/cert.pem
          -subj '/CN=uchi'
          -addext 'subjectAltName=DNS:localhost,IP:0.0.0.0';
      fi;
      caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
      "
    restart: unless-stopped

volumes:
  uchi-data:
  caddy-data:
  caddy-config:
  caddy-certs:
